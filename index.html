<!DOCTYPE html>

<html lang="id"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <title>Latihan JavaScript Dasar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        .container {
            background-color: white;
            width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 180px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        #box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            margin: 20px auto;
        }

        #output {
            font-size: 18px;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Latihan JavaScript Dasar</h1>

        <input type="text" id="nama" placeholder="Masukkan Nama">
        <input type="text" id="kelas" placeholder="Masukkan Kelas">
        <input type="number" id="absen" placeholder="No Absen">
        <input type="number" id="angka" placeholder="Masukkan Angka">

        <div id="box" style="width: 250px; height: 250px; background-color: green;"></div>

        <p id="output" style="font-weight: bold; color: green; font-size: 24px;">Belajar JavaScript itu mudah</p>

        <button onclick="tampilNama()">Tampilkan Nama</button>
        <button onclick="tampilKelas()">Tampilkan Kelas</button>
        <button onclick="ubahTeks()">Ubah Teks</button>
        <button onclick="ubahMerah()">Ubah Merah</button>
        <button onclick="ubahBiru()">Ubah Biru</button>
        <button onclick="ubahHijau()">Ubah Hijau</button>
        <button onclick="perbesarTeks()">Perbesar Teks</button>
        <button onclick="tebalkanTeks()">Tebalkan Teks</button>
        <button onclick="tampilAbsen()">Tampilkan Absen</button>
        <button onclick="tampilData()">Tampilkan Data</button>
        <button onclick="hapusTeks()">Hapus Teks</button>
        <button onclick="kecilkanKotak()">Kecilkan Kotak</button>
        <button onclick="besarkanKotak()">Besarkan Kotak</button>
        <button onclick="tampilAngka()">Tampilkan Angka</button>
        <button onclick="tampilWaktu()">Tampilkan Waktu</button>
    </div>

    <script>
        function tampilNama() 
        {
            let nama = document.getElementById("nama").value;
            document.getElementById("output").innerText = "Halo," + nama + " kawanku";
        }

        function tampilKelas() 
        {
            let kelas = document.getElementById("kelas").value;
            document.getElementById("output").innerText = " Pasti kamu dari kelas " + kelas + " itu kan?";
        }

        function ubahTeks() 
        {
            document.getElementById("output").innerText = "Belajar JavaScript itu mudah";
        }

        function ubahMerah() 
        {
            document.getElementById("box").style.backgroundColor = "red";
            document.getElementById("output").style.color = "red";
        }

        function ubahBiru() 
        {
            document.getElementById("box").style.backgroundColor = "blue";
            document.getElementById("output").style.color = "blue";
        }

        function ubahHijau() 
        {
            document.getElementById("box").style.backgroundColor = "green";
            document.getElementById("output").style.color = "green";
        }

        function perbesarTeks() 
        {
            document.getElementById("output").style.fontSize = "24px";
        }

        function tebalkanTeks() 
        {
            document.getElementById("output").style.fontWeight = "bold";
        }

        function tampilAbsen() 
        {
            let absen = document.getElementById("absen").value;
            document.getElementById("output").innerText = "Nomor absen mu " + absen + " kan!";
        }

        function tampilData() 
        {
            let nama = document.getElementById("nama").value;
            let kelas = document.getElementById("kelas").value;
            document.getElementById("output").innerText = "Nama saya " + nama + " dari " + kelas;
        }

        function hapusTeks() 
        {
            document.getElementById("output").innerText = "";
        }

        function kecilkanKotak() 
        {
            document.getElementById("box").style.width = "100px";
            document.getElementById("box").style.height = "100px";
        }

        function besarkanKotak() 
        {
            document.getElementById("box").style.width = "250px";
            document.getElementById("box").style.height = "250px";
        }

        function tampilAngka() 
        {
            let angka = document.getElementById("angka").value;
            document.getElementById("output").innerText = "Angka yang kamu masukan adalah " + angka;
        }

        function tampilWaktu() 
        {
            let sekarang = new Date();
            let waktuFormat = sekarang.toLocaleDateString
            ('en-US', 
                {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                }
            );
            document.getElementById("output").innerHTML = 
                "<p> Its " + waktuFormat + "</p>";
            }
    </script>


</body></html>
